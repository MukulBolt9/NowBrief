name: Build NowBrief APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ✅ Install dependencies FIRST (CRITICAL)
      - name: Install npm dependencies
        run: npm install

      # ✅ Verify plugin exists (debug)
      - name: Verify plugin
        run: |
          ls node_modules/@react-native
          ls node_modules/@react-native/gradle-plugin

      # Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Android SDK
      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          sdkmanager "platforms;android-35" "build-tools;34.0.0" "platform-tools"

      # Gradle permission
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 🔥 BUILD
      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug --stacktrace

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk