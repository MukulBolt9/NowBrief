# Project-wide Gradle settings
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.configureondemand=true
org.gradle.daemon=true

# Android
android.useAndroidX=true
android.enableJetifier=true

# React Native
reactNativeArchitectures=arm64-v8a,x86_64
newArchEnabled=false
hermesEnabled=true

# Signing — override these in your local gradle.properties (NOT committed to git)
# NOWBRIEF_UPLOAD_STORE_FILE=nowbrief-release.keystore
# NOWBRIEF_UPLOAD_KEY_ALIAS=nowbrief-key
# NOWBRIEF_UPLOAD_STORE_PASSWORD=
# NOWBRIEF_UPLOAD_KEY_PASSWORD=
